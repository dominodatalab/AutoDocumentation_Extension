slug: fairness
card_title: "Fairness & Bias Report"
card_description: "Bias analysis, fairness metrics, and mitigation documentation for regulated use cases."

title: "Fairness & Bias Assessment Report"
authors: "Data Science Team"

sections:
  - Executive Summary
  - Model & Data Overview
  - "Development History: per_model"
  - Protected Attributes & Demographic Analysis
  - "Bias Metrics: per_model"
  - Statistical Parity Analysis
  - Individual Fairness Evaluation
  - Intersectional Analysis
  - Mitigation Strategies Applied
  - Ongoing Monitoring Plan
  - Governance & Risk
  - Conclusion & Sign-off

hints:
  "Executive Summary": >
    Summarize key fairness findings, flag any metrics that exceed acceptable
    thresholds, and state whether the model is approved for deployment.
    Include a risk rating (Low / Medium / High) with clear justification. Do not state risk tier, approval state, or other governance status in this section; see Governance & Risk.
  "Model & Data Overview": >
    Describe the model task, training data sources, collection dates, and
    any known demographic representation issues. Note data provenance and
    any preprocessing steps that may affect fairness. Do not state risk tier, approval state, or other governance status in this section; see Governance & Risk.
  "Protected Attributes & Demographic Analysis": >
    List the protected attributes analyzed (e.g., age, gender, race, income).
    Report their distributions in training and evaluation data, and highlight
    any observed imbalances that could propagate bias. Do not state risk tier, approval state, or other governance status in this section; see Governance & Risk.
  "Bias Metrics": >
    Report disparate impact ratio, equalized odds difference, demographic
    parity difference, and predictive parity metrics per demographic group.
    Include 95% confidence intervals. Flag metrics that exceed acceptable
    thresholds defined by organizational policy. Do not state risk tier, approval state, or other governance status in this section; see Governance & Risk.
  "Statistical Parity Analysis": >
    Analyze whether positive prediction rates are statistically similar across
    demographic groups. Include hypothesis test results and p-values.
    Visualize disparities with group-level comparisons. Do not state risk tier, approval state, or other governance status in this section; see Governance & Risk.
  "Individual Fairness Evaluation": >
    Assess whether similar individuals receive similar model predictions
    regardless of protected attribute membership. Document the similarity
    metric used and counterfactual testing results where applicable. Do not state risk tier, approval state, or other governance status in this section; see Governance & Risk.
  "Intersectional Analysis": >
    Examine fairness metrics at the intersection of multiple protected
    attributes to surface compounded disparities that may be invisible
    when attributes are analyzed independently. Do not state risk tier, approval state, or other governance status in this section; see Governance & Risk.
  "Mitigation Strategies Applied": >
    Document any pre-processing (resampling, reweighting), in-processing
    (constrained optimization), or post-processing (threshold adjustment)
    bias mitigation techniques applied. Report their measured impact on
    fairness metrics and any accuracy trade-offs. Do not state risk tier, approval state, or other governance status in this section; see Governance & Risk.
  "Ongoing Monitoring Plan": >
    Define metrics, thresholds, and cadence for ongoing fairness monitoring
    in production. Include trigger conditions for model re-evaluation,
    responsible parties, and escalation procedures. Do not state risk tier, approval state, or other governance status in this section; see Governance & Risk.
  "Development History": >
    Document the models and versions explored during development, as found in the
    MLflow experiment history and code. Describe what was tried, how candidates
    compared, and which model was ultimately promoted. These are development
    candidates — describe them from code and MLflow evidence only. Do not assign
    them a risk classification, approval state, or any governance status; they
    were not governed. The absence of governance data here is expected, not a gap. See Governance & Risk for governed model status.
  "Governance & Risk": >
    This section describes the governed model(s) of record named in
    [@governance.model_of_record] — the model(s) tied to the selected governance
    bundle. State risk tier, intended use, validation status, approval state, and
    any open findings VERBATIM from the Governance Evidence block, each with its
    citation. Always name the governed model(s) so governance facts are never read
    as applying to a development candidate. Do not infer governance facts from
    code or MLflow; if a fact is not in the Governance Evidence block, omit it.

  "Conclusion & Sign-off": >
    Summarize the overall fairness posture of the model. State deployment
    recommendation with conditions. Note any required approvals or review
    checkpoints before production deployment. Do not state risk tier, approval state, or other governance status in this section; see Governance & Risk.
