slug: standard_ml
card_title: "Standard ML Model Doc"
card_description: "Full documentation for production ML models with MLflow experiment tracking."

title: "Machine Learning Model Documentation"
authors: "Data Science Team"

sections:
  - Executive Summary
  - Intended Use & Scope
  - Data Overview
  - "Development History: per_model"
  - Feature Engineering
  - Model Architecture
  - Training Pipeline
  - "Model Registry & Lineage: per_model"
  - "Model Performance: per_model"
  - Validation Results
  - Governance & Risk
  - Operations & Monitoring
  - Conclusion
  - Appendix

hints:
  "Executive Summary": >
    Focus on business impact, key metrics, and high-level model capabilities.
    Keep it suitable for non-technical stakeholders. Only document facts supported
    by project context (code, MLflow, registered models, governance evidence). If
    this section's topic is not evidenced, state that clearly in one short paragraph
    and do not invent metrics or methodology. Do not state risk tier, approval state,
    or other governance status in this section; see Governance & Risk.
  "Intended Use & Scope": >
    Describe the decisions the model supports, intended users, and explicit out-of-scope
    uses based on code and documentation. Only document facts supported by project
    context (code, MLflow, registered models, governance evidence). If this section's
    topic is not evidenced, state that clearly in one short paragraph and do not invent
    use cases. Do not state risk tier, approval state, or other governance status in
    this section; see Governance & Risk.
  "Data Overview": >
    Describe data sources, volume, quality considerations, and any data preprocessing
    steps applied before feature engineering. Only document facts supported by project
    context (code, MLflow, registered models, governance evidence). If this section's
    topic is not evidenced, state that clearly in one short paragraph and do not invent
    data characteristics. Do not state risk tier, approval state, or other governance
    status in this section; see Governance & Risk.
  "Feature Engineering": >
    Document feature transformations, encoding methods, scaling approaches, and feature
    selection rationale from code evidence. Only document facts supported by project
    context (code, MLflow, registered models, governance evidence). If this section's
    topic is not evidenced, state that clearly in one short paragraph and do not invent
    features. Do not state risk tier, approval state, or other governance status in this
    section; see Governance & Risk.
  "Model Architecture": >
    Include model type, hyperparameters, training configuration, and architectural
    decisions from code evidence. Only document facts supported by project context
    (code, MLflow, registered models, governance evidence). If this section's topic is
    not evidenced, state that clearly in one short paragraph and do not invent
    architecture details. Do not state risk tier, approval state, or other governance
    status in this section; see Governance & Risk.
  "Training Pipeline": >
    Document training orchestration (Domino jobs, pipelines), train/validation splits,
    hyperparameter search, and early stopping from code evidence only. Only document
    facts supported by project context (code, MLflow, registered models, governance
    evidence). If this section's topic is not evidenced, state that clearly in one short
    paragraph and do not invent pipeline steps. Do not state risk tier, approval state,
    or other governance status in this section; see Governance & Risk.
  "Model Registry & Lineage": >
    Document registered model name, version, stage, artifacts, and linkage to training
    runs from registry and MLflow evidence. Only document facts supported by project
    context (code, MLflow, registered models, governance evidence). If this section's
    topic is not evidenced, state that clearly in one short paragraph and do not invent
    registry metadata. Do not state risk tier, approval state, or other governance
    status in this section; see Governance & Risk.
  "Model Performance": >
    Present key metrics (accuracy, AUC, F1, etc.), confusion matrix insights, and
    performance analysis across different segments from evidenced results. Compare to
    a baseline when one is available. Only document facts supported by project context
    (code, MLflow, registered models, governance evidence). If this section's topic is
    not evidenced, state that clearly in one short paragraph and do not invent metrics.
    Do not state risk tier, approval state, or other governance status in this section;
    see Governance & Risk.
  "Validation Results": >
    Document the validation approach used based on what is found in the code. If
    cross-validation was implemented, cover those results. If only holdout/test set
    validation was used, document that approach. Include bias or fairness analysis only
    if implemented in code or metrics. Do not describe validation methods that were not
    actually implemented. Only document facts supported by project context (code, MLflow,
    registered models, governance evidence). If this section's topic is not evidenced,
    state that clearly in one short paragraph. Do not state risk tier, approval state,
    or other governance status in this section; see Governance & Risk.
  "Development History": >
    Document the models and versions explored during development, as found in the
    MLflow experiment history and code. Describe what was tried, how candidates
    compared, and which model was ultimately promoted. These are development candidates
    — describe them from code and MLflow evidence only. Do not assign them a risk
    classification, approval state, or any governance status; they were not governed.
    The absence of governance data here is expected, not a gap. See Governance & Risk
    for governed model status.
  "Governance & Risk": >
    This section describes the governed model(s) of record named in
    [@governance.model_of_record] — the model(s) tied to the selected governance
    bundle. State risk tier, intended use, validation status, approval state, and
    any open findings VERBATIM from the Governance Evidence block, each with its
    citation. Always name the governed model(s) so governance facts are never read
    as applying to a development candidate. Do not infer governance facts from
    code or MLflow; if a fact is not in the Governance Evidence block, omit it.
  "Operations & Monitoring": >
    Address inference latency, resource requirements, drift monitoring, alerting, model
    refresh cadence, and rollback considerations. Document observability hooks found in
    code; if none are evidenced, you may suggest generic monitoring approaches but label
    them as recommendations, not implemented controls. Only document facts supported by
    project context (code, MLflow, registered models, governance evidence). If this
    section's topic is not evidenced beyond recommendations, say so. Do not state risk
    tier, approval state, or other governance status in this section; see Governance & Risk.
  "Conclusion": >
    Summarize the key model capabilities and performance highlights. Describe recommended
    monitoring approach based on the model type. Suggest model refresh considerations
    based on the ML task type. Note any limitations observed in the validation results.
    Do not introduce new technical details — synthesize what was covered. Do not state
    risk tier, approval state, or other governance status in this section; see Governance
    & Risk.
  "Appendix": >
    Include reproducibility details when evidenced: environment, random seeds, data
    snapshot identifiers, key file paths, and run references. Supporting tables and
    metric definitions may be included when present in project context. Only document
    facts supported by project context (code, MLflow, registered models, governance
    evidence). If this section's topic is not evidenced, state that clearly in one short
    paragraph. Do not state risk tier, approval state, or other governance status in this
    section; see Governance & Risk.
